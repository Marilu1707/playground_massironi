{% extends "base/base.html" %}

{% block title %}Eliminar receta — Nido Mozzarella{% endblock %}

{% block content %}

<div class="form-container">
    <h1 class="form-title">🗑️ Eliminar receta</h1>
    <p style="margin-bottom:1.5rem;">
        ¿Estás segura de que querés eliminar <strong>"{{ post.titulo }}"</strong>?
        Esta acción no se puede deshacer.
    </p>
    <form method="post" style="display:flex; gap:0.5rem;">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
        <a href="{% url 'post_detail' post.id %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>

{% endblock %}
